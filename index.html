<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camila | Portfólio Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAF9F6;
            --text-main: #2D2D2D;
            --text-secondary: #6B6B6B;
            --accent: #A3937B;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .work-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/5;
            background-color: #E8E6E1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .work-item:hover {
            transform: translateY(-5px);
        }

        .work-item span {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--accent);
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* Animação suave de entrada */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="fade-in">
        <h1>Camila</h1>
        <div class="subtitle">Estrategista Visual & Fotógrafa</div>
        <div class="nav-links">
            <a href="#work">Projetos</a>
            <a href="#about">Sobre</a>
            <a href="#contact">Contato</a>
        </div>
    </header>

    <main class="container" id="work">
        <div class="grid">
            <div class="work-item"><span>Projeto I</span></div>
            <div class="work-item"><span>Projeto II</span></div>
            <div class="work-item"><span>Projeto III</span></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 — Todos os direitos reservados.</p>
    </footer>

</body>
</html>
